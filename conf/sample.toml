# Copy this file to default.toml (or any name) and fill in your values.
# Load with config.Load() for default.toml, or config.LoadFrom("name") for others.

[server]
port = 8080
read_timeout = 30   # seconds
write_timeout = 30  # seconds
idle_timeout = 60   # seconds
enable_request_logging = false

[auth]
internal_token = "your-secret-token-here"

[cors]
allowed_origins = ["https://yourdomain.com"]
allowed_methods = ["GET", "POST", "OPTIONS"]
allowed_headers = ["Authorization", "Content-Type", "X-Request-ID"]

[logger]
enable_console_logger = true
enable_file_logger = false

[logger.file]
# Only used when enable_file_logger = true
file_name = "app.log"
path = "/var/log/admin-stats"

[mongo]
uri = "mongodb://localhost:27017"
db_name = "jackpotbet"

[redis]
addr = "localhost:6379"
password = ""
db = 0  # 0 = default db; use a different number for test environments
